name: Health News Monitor

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install httpx beautifulsoup4 lxml pandas

      # Step 1: Ensure keywords.json exists
      - name: Check keywords.json
        run: |
          if [ ! -f data/news/keywords.json ]; then
            echo "Generating keywords..."
            python scripts/generate_news_keywords.py
          fi

      # Step 2: Fetch news from Singapore sources
      - name: Fetch Singapore news
        run: python scripts/fetchers/sg_news.py

      # Step 3: Process and generate pages
      - name: Process news
        run: python scripts/process_news.py

      # Step 4: Commit changes
      - name: Commit changes
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

          # Add changed files
          git add data/news/*.json docs/_news/ docs/data/news-index.json || true

          # Check if there are changes
          if git diff --staged --quiet; then
            echo "No news updates"
          else
            git commit -m "Update health news $(date +%Y-%m-%d-%H%M)"
            git push
          fi

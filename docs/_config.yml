# SgTxGNN Jekyll Configuration
# Singapore Drug Repurposing Prediction System

title: SgTxGNN Drug Repurposing Reports
description: Singapore Drug Repurposing Prediction Reports - AI-powered drug repurposing candidates for Singapore HSA approved medications
remote_theme: just-the-docs/just-the-docs
url: https://sgtxgnn.yao.care
baseurl: ""

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# RSS Feed settings
feed:
  path: feed.xml
  collections:
    drugs:
      path: "/drugs/feed.xml"

# Open Graph settings
og_image: /assets/images/og-default.png

# Twitter Card settings
twitter:
  card: summary_large_image

# Author info (E-E-A-T)
author:
  name: SgTxGNN Team
  url: https://sgtxgnn.yao.care/about/

# Allow future dated posts
future: true

# Kramdown settings - disable SmartyPants for correct table rendering
kramdown:
  smart_quotes: ["apos", "apos", "quot", "quot"]
  typographic_symbols:
    ndash: "--"
    mdash: "---"

# Navigation settings
nav_sort: case_insensitive

# Search settings
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Footer
footer_content: "Copyright &copy; 2026 Yao.Care. For research purposes only. Not medical advice."

# Colour theme
color_scheme: light

# Auxiliary links
aux_links:
  "GitHub":
    - "https://github.com/yao-care/SgTxGNN"

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Exclude files
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - "*.template"

# Collections
collections:
  drugs:
    output: true
    permalink: /drugs/:name/
  news:
    output: true
    permalink: /news/:name/

defaults:
  - scope:
      path: "_drugs"
      type: "drugs"
    values:
      layout: "default"
      nav_exclude: false
  - scope:
      path: "_news"
      type: "news"
    values:
      layout: "default"
      nav_exclude: true
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "default"
      nav_exclude: true

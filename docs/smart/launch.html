<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SgTxGNN - Launching SMART App...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1a5276 0%, #2e86ab 100%);
            color: white;
        }
        .loading {
            text-align: center;
        }
        .logo {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .logo span {
            color: #f39c12;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
        }
        .disclaimer {
            font-size: 0.8em;
            opacity: 0.8;
            margin-top: 20px;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="logo">Sg<span>TxGNN</span></div>
        <div class="spinner"></div>
        <p>Connecting to EHR...</p>
        <p class="disclaimer">
            For research purposes only.<br>
            Not intended for clinical decision-making.
        </p>
    </div>
    <div class="error" id="error" style="display: none;">
        <h2>Launch Error</h2>
        <p id="error-message"></p>
        <p><a href="/" style="color: #f39c12;">Return to SgTxGNN</a></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.5.4/build/fhir-client.min.js"></script>
    <script>
        // SgTxGNN SMART on FHIR Configuration
        const CLIENT_ID = "sgtxgnn-smart-app";
        const REDIRECT_URI = window.location.origin + "/smart/app.html";

        FHIR.oauth2.authorize({
            client_id: CLIENT_ID,
            scope: "launch patient/MedicationRequest.read patient/MedicationStatement.read patient/Patient.read patient/Condition.read",
            redirect_uri: REDIRECT_URI,
            pkce: true
        }).catch(function(error) {
            document.getElementById("loading").style.display = "none";
            document.getElementById("error").style.display = "block";
            document.getElementById("error-message").textContent = error.message || "Unknown error occurred during EHR connection.";
            console.error("SMART Launch Error:", error);
        });
    </script>
</body>
</html>
